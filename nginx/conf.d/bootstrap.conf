# Usado só na primeira vez para emitir o certificado Let's Encrypt
# Após emitir o cert, este arquivo é substituído pelo helpaste.conf completo

server {
    listen 80;
    server_name helpaste.com www.helpaste.com api.helpaste.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
    }
}
