# Otimizado para MacBook Pro M4 (12+ cores, 24+ GB RAM, Apple Silicon)
services:
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    container_name: scanner_redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 300 10
      --save 60 10000
      --tcp-backlog 2048
      --hz 100
      --dynamic-hz yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --io-threads 4
      --io-threads-do-reads yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - scanner_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2560m
        reservations:
          cpus: "0.5"
          memory: 512m

  app:
    build: .
    platform: linux/arm64
    container_name: scanner_app
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5001:5000"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
      nproc:
        soft: 131072
        hard: 131072
    sysctls:
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.ip_local_port_range=1024 65535
      - net.ipv4.tcp_fin_timeout=10
      - net.ipv4.tcp_keepalive_time=120
    env_file:
      - .env
    environment:
      AUTH_USERNAME: "admin"
      AUTH_PASSWORD: "scanner2026"
      REDIS_URL: "redis://redis:6379/0"
      FEED_ENABLED: "false"
      LOG_LEVEL: "INFO"
      NETWORK_SCANNER_ENABLED: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONOPTIMIZE: "2"
      PYTHONDONTWRITEBYTECODE: "1"
      MALLOC_ARENA_MAX: "2"
      UV_THREADPOOL_SIZE: "16"

      # --- Performance: scanner (M4 power) ---
      NUM_WORKERS: "1500"
      SCAN_INTERVAL: "0"
      PRESCAN_TIMEOUT: "0.15"
      BATCH_SIZE: "500"
      BATCH_FLUSH_INTERVAL: "0.3"
      MAX_CONCURRENT_CONNS: "50000"

      # --- Performance: enrichment rate limits ---
      SHODAN_RPS: "20"
      IPAPI_RPS: "2"
      IPINFO_RPS: "2"

      # --- Masscan ---
      MASSCAN_ENABLED: "auto"
      MASSCAN_RATE: "200000"

      # --- Vuln scanner ---
      VULN_WORKERS: "8"
      VULN_AUTO_SCAN: "true"
      VULN_AUTO_MIN_SCORE: "50"
      NUCLEI_SEVERITY: "critical,high,medium"
      NUCLEI_TIMEOUT: "180"
      NUCLEI_RATE_LIMIT: "300"
      NUCLEI_BULK_SIZE: "75"
      NUCLEI_CONCURRENCY: "40"
      NMAP_TIMEOUT: "120"

      # --- Bounty ---
      BOUNTY_MODE: "true"
      BOUNTY_RECON_INTERVAL: "14400"
      BOUNTY_RECON_WORKERS: "6"
      SUBFINDER_TIMEOUT: "180"
      HTTPX_TIMEOUT: "180"
      HTTPX_THREADS: "80"

      # --- HackerOne ---
      HACKERONE_API_USERNAME: "jackpa1984"

      # --- Tools ---
      BUG_SCRAPER_PATH: "/opt/Bug_Scraper/bug-scraper.py"
      BUG_SCRAPER_ARGS: "--mode discovery --output json"
      HTTP_PORT_SCANNER_ENABLED: "true"
      HTTP_PORT_SCANNER_PATH: "/opt/HTTP-Port-Scanner-HackerOne-Edition/scanner.py"

      ABUSEIPDB_KEY: ""
      IPINFO_TOKEN: ""

      # --- New tools ---
      KATANA_TIMEOUT: "120"
      KATANA_DEPTH: "3"
      GAU_TIMEOUT: "60"

      # --- Telegram alerts ---
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host=0.0.0.0
      - --port=5000
      - --log-level=info
      - --timeout-keep-alive=30
      - --limit-concurrency=500
      - --backlog=4096
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - scanner_net
    deploy:
      resources:
        limits:
          cpus: "6.0"
          memory: 8g
        reservations:
          cpus: "2.0"
          memory: 2g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    platform: linux/arm64
    container_name: scanner_frontend
    depends_on:
      - app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
      API_BACKEND_URL: http://app:5000
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 512m
    networks:
      - scanner_net

volumes:
  redis_data:

networks:
  scanner_net:
    name: scanner-internet_default
