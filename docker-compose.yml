# Configuracao leve — baixo consumo de recursos
services:
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    container_name: scanner_redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 300 10
      --tcp-backlog 512
      --hz 10
      --dynamic-hz yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - scanner_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 640m
        reservations:
          cpus: "0.1"
          memory: 128m

  app:
    build: .
    platform: linux/arm64
    container_name: scanner_app
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5001:5000"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ulimits:
      nofile:
        soft: 16384
        hard: 16384
      nproc:
        soft: 4096
        hard: 4096
    env_file:
      - .env
    environment:
      AUTH_USERNAME: "admin"
      AUTH_PASSWORD: "scanner2026"
      REDIS_URL: "redis://redis:6379/0"
      FEED_ENABLED: "false"
      LOG_LEVEL: "INFO"
      NETWORK_SCANNER_ENABLED: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONOPTIMIZE: "2"
      PYTHONDONTWRITEBYTECODE: "1"
      MALLOC_ARENA_MAX: "2"
      UV_THREADPOOL_SIZE: "4"

      # --- Performance: scanner (leve) ---
      NUM_WORKERS: "50"
      SCAN_INTERVAL: "0"
      PRESCAN_TIMEOUT: "0.5"
      BATCH_SIZE: "50"
      BATCH_FLUSH_INTERVAL: "2"
      MAX_CONCURRENT_CONNS: "1000"

      # --- Performance: enrichment rate limits ---
      SHODAN_RPS: "5"
      IPAPI_RPS: "1"
      IPINFO_RPS: "1"

      # --- Masscan ---
      MASSCAN_ENABLED: "false"
      MASSCAN_RATE: "10000"

      # --- Vuln scanner ---
      VULN_WORKERS: "8"
      VULN_AUTO_SCAN: "true"
      VULN_AUTO_MIN_SCORE: "50"
      NUCLEI_SEVERITY: "critical,high,medium"
      NUCLEI_TIMEOUT: "180"
      NUCLEI_RATE_LIMIT: "50"
      NUCLEI_BULK_SIZE: "10"
      NUCLEI_CONCURRENCY: "5"
      NMAP_TIMEOUT: "120"

      # --- Bounty ---
      BOUNTY_MODE: "true"
      BOUNTY_RECON_INTERVAL: "14400"
      BOUNTY_RECON_WORKERS: "8"
      SUBFINDER_TIMEOUT: "300"
      HTTPX_TIMEOUT: "300"
      HTTPX_THREADS: "10"

      # --- HackerOne ---
      HACKERONE_API_USERNAME: "jackpa1984"

      # --- Tools ---
      BUG_SCRAPER_PATH: "/opt/Bug_Scraper/bug-scraper.py"
      BUG_SCRAPER_ARGS: "--mode discovery --output json"
      HTTP_PORT_SCANNER_ENABLED: "true"
      HTTP_PORT_SCANNER_PATH: "/opt/HTTP-Port-Scanner-HackerOne-Edition/scanner.py"

      ABUSEIPDB_KEY: ""
      IPINFO_TOKEN: ""

      # --- New tools ---
      KATANA_TIMEOUT: "120"
      KATANA_DEPTH: "2"
      GAU_TIMEOUT: "60"

      # --- AI Analyzer (configure in .env) ---
      # Options: "openai", "anthropic", "ollama", or "" to disable
      AI_PROVIDER: "${AI_PROVIDER:-ollama}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}"
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-xploiter/the-xploiter}"
      AI_MAX_TOKENS: "${AI_MAX_TOKENS:-3000}"
      AI_TEMPERATURE: "${AI_TEMPERATURE:-0.1}"

      # --- Advanced scanners ---
      PROGRAM_SCORER_ENABLED: "true"
      PROGRAM_SCORER_INTERVAL: "3600"
      H1_MONITOR_INTERVAL: "1800"
      IDOR_SCANNER_ENABLED: "true"
      SSRF_SCANNER_ENABLED: "true"
      GRAPHQL_SCANNER_ENABLED: "true"
      RACE_SCANNER_ENABLED: "true"
      INTERACTSH_ENABLED: "true"
      INTERACTSH_SERVER: "oast.fun"
      CT_MONITOR_ENABLED: "true"
      CT_POLL_INTERVAL: "600"
      CVE_MONITOR_ENABLED: "true"
      CVE_POLL_INTERVAL: "1800"
      ROI_TRACKER_ENABLED: "true"
      CUSTOM_NUCLEI_TEMPLATES: "/app/nuclei-custom-templates"

      # --- Telegram alerts ---
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    volumes:
      - ./app:/app/app
      - ./nuclei-custom-templates:/app/nuclei-custom-templates
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host=0.0.0.0
      - --port=5000
      - --log-level=info
      - --timeout-keep-alive=30
      - --limit-concurrency=100
      - --backlog=512
      - --reload
      - --reload-dir=/app/app
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - scanner_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 512m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    platform: linux/arm64
    container_name: scanner_frontend
    depends_on:
      - app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
      API_BACKEND_URL: http://app:5000
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 256m
    networks:
      - scanner_net

volumes:
  redis_data:

networks:
  scanner_net:
    name: scanner-internet_default
