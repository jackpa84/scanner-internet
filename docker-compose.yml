# Otimizado para M4 Pro (12 cores, 24GB RAM)
services:
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    container_name: scanner_redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 300 10
      --save 60 10000
      --tcp-backlog 4096
      --hz 100
      --dynamic-hz yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --io-threads 4
      --io-threads-do-reads yes
      --activedefrag yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - scanner_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 5g
        reservations:
          cpus: "0.5"
          memory: 1g

  app:
    build: .
    platform: linux/arm64
    container_name: scanner_app
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5001:5000"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc:
        soft: 65536
        hard: 65536
    sysctls:
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.ip_local_port_range=1024 65535
      - net.ipv4.tcp_fin_timeout=10
      - net.ipv4.tcp_keepalive_time=60
      - net.core.somaxconn=8192
    env_file:
      - .env
    environment:
      AUTH_USERNAME: "admin"
      AUTH_PASSWORD: "scanner2026"
      REDIS_URL: "redis://redis:6379/0"
      FEED_ENABLED: "false"
      LOG_LEVEL: "INFO"
      NETWORK_SCANNER_ENABLED: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONOPTIMIZE: "2"
      PYTHONDONTWRITEBYTECODE: "1"
      MALLOC_ARENA_MAX: "4"
      UV_THREADPOOL_SIZE: "32"

      # --- Network scanner (M4 Pro: 12 cores) ---
      NUM_WORKERS: "2000"
      SCAN_INTERVAL: "0"
      PRESCAN_TIMEOUT: "0.12"
      BATCH_SIZE: "500"
      BATCH_FLUSH_INTERVAL: "0.3"
      MAX_CONCURRENT_CONNS: "60000"

      # --- Enrichment ---
      SHODAN_RPS: "25"
      IPAPI_RPS: "5"
      IPINFO_RPS: "5"

      # --- Masscan ---
      MASSCAN_ENABLED: "auto"
      MASSCAN_RATE: "300000"

      # --- Vuln scanner (M4 Pro: parallel) ---
      VULN_WORKERS: "20"
      VULN_AUTO_SCAN: "true"
      VULN_AUTO_MIN_SCORE: "35"
      NUCLEI_SEVERITY: "critical,high,medium"
      NUCLEI_TIMEOUT: "90"
      NUCLEI_RATE_LIMIT: "800"
      NUCLEI_BULK_SIZE: "150"
      NUCLEI_CONCURRENCY: "75"
      NMAP_TIMEOUT: "60"

      # --- Bounty recon (M4 Pro: max parallel) ---
      BOUNTY_MODE: "true"
      BOUNTY_RECON_INTERVAL: "7200"
      BOUNTY_RECON_WORKERS: "20"
      SUBFINDER_TIMEOUT: "90"
      HTTPX_TIMEOUT: "90"
      HTTPX_THREADS: "150"

      # --- HackerOne ---
      HACKERONE_API_USERNAME: "jackpa1984"

      # --- Tools ---
      BUG_SCRAPER_PATH: "/opt/Bug_Scraper/bug-scraper.py"
      BUG_SCRAPER_ARGS: "--mode discovery --output json"
      HTTP_PORT_SCANNER_ENABLED: "true"
      HTTP_PORT_SCANNER_PATH: "/opt/HTTP-Port-Scanner-HackerOne-Edition/scanner.py"

      ABUSEIPDB_KEY: ""
      IPINFO_TOKEN: ""

      # --- Tools (fast) ---
      KATANA_TIMEOUT: "60"
      KATANA_DEPTH: "3"
      KATANA_CONCURRENCY: "30"
      GAU_TIMEOUT: "30"

      # --- Intigriti ---
      INTIGRITI_API_TOKEN: "${INTIGRITI_API_TOKEN:-}"

      # --- AI Analyzer ---
      AI_PROVIDER: "${AI_PROVIDER:-ollama}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}"
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-xploiter/the-xploiter}"
      AI_MAX_TOKENS: "${AI_MAX_TOKENS:-3000}"
      AI_TEMPERATURE: "${AI_TEMPERATURE:-0.1}"

      # --- Bounty Targets Data ---
      BOUNTY_DATA_ENABLED: "true"
      BOUNTY_DATA_INTERVAL: "1800"
      BOUNTY_DATA_AUTO_IMPORT: "true"
      BOUNTY_DATA_MIN_BOUNTY: "0"
      BOUNTY_DATA_PLATFORMS: "hackerone,bugcrowd,intigriti,yeswehack"

      # --- Advanced scanners ---
      PROGRAM_SCORER_ENABLED: "true"
      PROGRAM_SCORER_INTERVAL: "3600"
      H1_MONITOR_INTERVAL: "1800"
      IDOR_SCANNER_ENABLED: "true"
      SSRF_SCANNER_ENABLED: "true"
      GRAPHQL_SCANNER_ENABLED: "true"
      RACE_SCANNER_ENABLED: "true"
      INTERACTSH_ENABLED: "true"
      INTERACTSH_SERVER: "oast.fun"
      CT_MONITOR_ENABLED: "true"
      CT_POLL_INTERVAL: "600"
      CVE_MONITOR_ENABLED: "true"
      CVE_POLL_INTERVAL: "1800"
      ROI_TRACKER_ENABLED: "true"
      CUSTOM_NUCLEI_TEMPLATES: "/app/nuclei-custom-templates"

      # --- Telegram ---
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    volumes:
      - ./app:/app/app
      - ./nuclei-custom-templates:/app/nuclei-custom-templates
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host=0.0.0.0
      - --port=5000
      - --log-level=info
      - --timeout-keep-alive=30
      - --limit-concurrency=500
      - --backlog=4096
      - --reload
      - --reload-dir=/app/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - scanner_net
    deploy:
      resources:
        limits:
          cpus: "10.0"
          memory: 16g
        reservations:
          cpus: "4.0"
          memory: 4g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    platform: linux/arm64
    container_name: scanner_frontend
    depends_on:
      - app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
      API_BACKEND_URL: http://app:5000
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 512m
    networks:
      - scanner_net

volumes:
  redis_data:

networks:
  scanner_net:
    name: scanner-internet_default
