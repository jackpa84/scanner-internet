# Modo alto desempenho — TencentCloud SA5.4XLARGE32 (16 vCPUs / 32GB RAM)
services:
  mongo:
    image: mongo:7
    container_name: scanner_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin@321
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - scanner_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3g
        reservations:
          cpus: "0.5"
          memory: 512m

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: scanner_redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 10240mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --save ""
      --tcp-backlog 8192
      --hz 20
      --dynamic-hz yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --io-threads 4
      --io-threads-do-reads yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - scanner_net
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 11g
        reservations:
          cpus: "1.0"
          memory: 1g

  app:
    build: .
    platform: linux/amd64
    container_name: scanner_app
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5001:5000"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc:
        soft: 65536
        hard: 65536
    sysctls:
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.ip_local_port_range=1024 65535
      - net.ipv4.tcp_fin_timeout=10
      - net.ipv4.tcp_keepalive_time=60
      - net.core.somaxconn=65536
    env_file:
      - .env
    environment:
      AUTH_USERNAME: "${AUTH_USERNAME:-admin}"
      AUTH_PASSWORD: "${AUTH_PASSWORD:-scanner2026}"
      REDIS_URL: "redis://redis:6379/0"
      MONGODB_URI: "mongodb://admin:admin%40321@mongo:27017/scanner?authSource=admin"
      FEED_ENABLED: "false"
      LOG_LEVEL: "WARNING"
      NETWORK_SCANNER_ENABLED: "false"
      # --- Ferramentas desabilitadas (não instaladas no container) ---
      HTTP_PORT_SCANNER_ENABLED: "false"
      PYTHONUNBUFFERED: "1"
      PYTHONOPTIMIZE: "2"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONASYNCIODEBUG: "0"
      PYTHONWARNINGS: "ignore::DeprecationWarning"
      MALLOC_ARENA_MAX: "16"
      UV_THREADPOOL_SIZE: "1024"

      # --- Network scanner ---
      NUM_WORKERS: "2500"
      SCAN_INTERVAL: "0"
      PRESCAN_TIMEOUT: "0.3"
      BATCH_SIZE: "2500"
      BATCH_FLUSH_INTERVAL: "0.3"
      MAX_CONCURRENT_CONNS: "250000"

      # --- Enrichment ---
      SHODAN_RPS: "5"
      IPAPI_RPS: "2"
      IPINFO_RPS: "2"

      # --- Masscan ---
      MASSCAN_ENABLED: "false"
      MASSCAN_RATE: "50000"

      # --- Vuln scanner ---
      VULN_WORKERS: "40"
      VULN_AUTO_SCAN: "true"
      VULN_AUTO_MIN_SCORE: "60"
      NUCLEI_SEVERITY: "critical,high,medium"
      NUCLEI_TIMEOUT: "90"
      NUCLEI_RATE_LIMIT: "5000"
      NUCLEI_BULK_SIZE: "1000"
      NUCLEI_CONCURRENCY: "500"
      NUCLEI_RETRIES: "0"
      NMAP_TIMEOUT: "60"

      # --- Bounty recon ---
      BOUNTY_MODE: "true"
      BOUNTY_RECON_INTERVAL: "3600"
      BOUNTY_RECON_WORKERS: "40"
      MAX_SUBPROCESS_WORKERS: "100"
      SUBFINDER_TIMEOUT: "60"
      HTTPX_TIMEOUT: "20"
      HTTPX_THREADS: "1500"
      CRTSH_RATE_INTERVAL: "4"
      SECURITY_CHECK_WORKERS: "200"
      ADVANCED_SCAN_WORKERS: "40"
      SAVE_TARGET_WORKERS: "150"

      # --- HackerOne ---
      HACKERONE_API_USERNAME: "${HACKERONE_API_USERNAME:-jackpach2084}"
      HACKERONE_API_TOKEN: "${HACKERONE_API_TOKEN:-}"
      H1_API_TOKEN: "${HACKERONE_API_TOKEN:-}"
      H1_PROGRAM_HANDLE: "${H1_PROGRAM_HANDLE:-}"
      H1_AUTO_SUBMIT: "false"
      H1_AUTO_SUBMIT_INTERVAL: "300"
      H1_AUTO_SUBMIT_BATCH: "10"
      H1_AUTO_SUBMIT_DRY_RUN: "true"

      # --- Tools ---
      BUG_SCRAPER_PATH: "/opt/Bug_Scraper/bug-scraper.py"
      BUG_SCRAPER_ARGS: "--mode discovery --output json"
      HTTP_PORT_SCANNER_PATH: "/opt/HTTP-Port-Scanner-HackerOne-Edition/scanner.py"

      ABUSEIPDB_KEY: ""
      IPINFO_TOKEN: ""

      # --- Tools ---
      KATANA_TIMEOUT: "45"
      KATANA_DEPTH: "3"
      KATANA_CONCURRENCY: "150"
      GAU_TIMEOUT: "30"

      # --- Intigriti ---
      INTIGRITI_API_TOKEN: "${INTIGRITI_API_TOKEN:-}"

      # --- AI Analyzer ---
      AI_PROVIDER: "anthropic"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "claude-sonnet-4-6"
      OLLAMA_URL: ""
      OLLAMA_MODEL: ""
      AI_MAX_TOKENS: "4000"
      AI_TEMPERATURE: "0.1"

      # --- Bounty Targets Data ---
      BOUNTY_DATA_ENABLED: "true"
      BOUNTY_DATA_INTERVAL: "1800"
      BOUNTY_DATA_AUTO_IMPORT: "true"
      BOUNTY_DATA_MIN_BOUNTY: "100"
      BOUNTY_DATA_PLATFORMS: "hackerone,intigriti,yeswehack"

      # --- Advanced scanners ---
      PROGRAM_SCORER_ENABLED: "true"
      PROGRAM_SCORER_INTERVAL: "3600"
      H1_MONITOR_INTERVAL: "1800"
      IDOR_SCANNER_ENABLED: "true"
      SSRF_SCANNER_ENABLED: "true"
      GRAPHQL_SCANNER_ENABLED: "true"
      RACE_SCANNER_ENABLED: "true"
      INTERACTSH_ENABLED: "true"
      INTERACTSH_SERVER: "interact.sh"
      CT_MONITOR_ENABLED: "true"
      CT_POLL_INTERVAL: "600"
      CVE_MONITOR_ENABLED: "false"
      CVE_POLL_INTERVAL: "1800"
      ROI_TRACKER_ENABLED: "true"
      CUSTOM_NUCLEI_TEMPLATES: "/app/nuclei-custom-templates"

      # --- Platform Watcher (madmax-hunter scraping) ---
      PLATFORM_WATCHER_ENABLED: "true"
      PLATFORM_WATCHER_INTERVAL: "1800"
      PLATFORM_WATCHER_PLATFORMS: "hackerone,intigriti,yeswehack"
      BUGCROWD_API_TOKEN: "${BUGCROWD_API_TOKEN:-}"
      YESWEHACK_TOKEN: "${YESWEHACK_TOKEN:-}"
      BUGHUNT_EMAIL: "${BUGHUNT_EMAIL:-}"
      BUGHUNT_PASSWORD: "${BUGHUNT_PASSWORD:-}"
      CAPSOLVER_API_KEY: "${CAPSOLVER_API_KEY:-}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"

      # --- Telegram ---
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    volumes:
      - ./app:/app/app
      - ./nuclei-custom-templates:/app/nuclei-custom-templates
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host=0.0.0.0
      - --port=5000
      - --workers=10
      - --loop=uvloop
      - --log-level=warning
      - --timeout-keep-alive=120
      - --limit-concurrency=5000
      - --backlog=8192
      - --timeout-graceful-shutdown=10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - scanner_net
    deploy:
      resources:
        limits:
          cpus: "12.0"
          memory: 16g
        reservations:
          cpus: "4.0"
          memory: 6g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: scanner_frontend
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "https://helpaste.com"
      API_BACKEND_URL: http://app:5000
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=2048"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
        reservations:
          cpus: "0.2"
          memory: 256m
    networks:
      - scanner_net

  nginx:
    image: nginx:alpine
    container_name: scanner_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - app
    restart: unless-stopped
    networks:
      - scanner_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m

  certbot:
    image: certbot/certbot
    container_name: scanner_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - scanner_net

volumes:
  redis_data:
  mongo_data:
  certbot_www:
  certbot_certs:

networks:
  scanner_net:
    name: scanner-internet_default
