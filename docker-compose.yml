# Otimizado para M4 Pro (12 cores, 24GB RAM)
# IMPORTANTE: Aumente o Docker Desktop para 16GB+ de RAM em:
#   Docker Desktop → Settings → Resources → Memory → 16384 MB
services:
  ollama:
    image: ollama/ollama:latest
    container_name: scanner_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "5m"
      OLLAMA_NUM_PARALLEL: "2"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        SERVER_PID=$$!
        echo "[ollama] aguardando servidor..."
        until curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; do sleep 1; done
        echo "[ollama] servidor pronto. puxando modelo ${OLLAMA_MODEL:-deepseek-r1:7b}..."
        ollama pull ${OLLAMA_MODEL:-deepseek-r1:7b}
        echo "[ollama] modelo pronto."
        wait $$SERVER_PID
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped
    networks:
      - scanner_net

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: scanner_redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite yes
      --save 300 10
      --save 60 10000
      --tcp-backlog 8192
      --hz 100
      --dynamic-hz yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --lazyfree-lazy-user-del yes
      --io-threads 8
      --io-threads-do-reads yes
      --activedefrag yes
      --maxmemory-samples 10
      --activerehashing yes
      --lfu-decay-time 1
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - scanner_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2.5g
        reservations:
          cpus: "0.5"
          memory: 512m

  app:
    build: .
    platform: linux/amd64
    container_name: scanner_app
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5001:5000"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc:
        soft: 65536
        hard: 65536
    sysctls:
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.ip_local_port_range=1024 65535
      - net.ipv4.tcp_fin_timeout=10
      - net.ipv4.tcp_keepalive_time=60
      - net.core.somaxconn=16384
    env_file:
      - .env
    environment:
      AUTH_USERNAME: "admin"
      AUTH_PASSWORD: "scanner2026"
      REDIS_URL: "redis://redis:6379/0"
      FEED_ENABLED: "false"
      LOG_LEVEL: "INFO"
      NETWORK_SCANNER_ENABLED: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONOPTIMIZE: "2"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONASYNCIODEBUG: "0"
      PYTHONWARNINGS: "ignore::DeprecationWarning"
      MALLOC_ARENA_MAX: "2"
      UV_THREADPOOL_SIZE: "64"

      # --- Network scanner (M4 Pro: 12 cores) ---
      NUM_WORKERS: "500"
      SCAN_INTERVAL: "0"
      PRESCAN_TIMEOUT: "0.12"
      BATCH_SIZE: "1000"
      BATCH_FLUSH_INTERVAL: "0.2"
      MAX_CONCURRENT_CONNS: "80000"

      # --- Enrichment ---
      SHODAN_RPS: "25"
      IPAPI_RPS: "5"
      IPINFO_RPS: "5"

      # --- Masscan ---
      MASSCAN_ENABLED: "auto"
      MASSCAN_RATE: "300000"

      # --- Vuln scanner (M4 Pro: parallel) ---
      VULN_WORKERS: "30"
      VULN_AUTO_SCAN: "true"
      VULN_AUTO_MIN_SCORE: "30"
      NUCLEI_SEVERITY: "critical,high,medium"
      NUCLEI_TIMEOUT: "90"
      NUCLEI_RATE_LIMIT: "1200"
      NUCLEI_BULK_SIZE: "200"
      NUCLEI_CONCURRENCY: "100"
      NMAP_TIMEOUT: "60"

      # --- Bounty recon (M4 Pro: max parallel) ---
      BOUNTY_MODE: "true"
      BOUNTY_RECON_INTERVAL: "3600"
      BOUNTY_RECON_WORKERS: "30"
      SUBFINDER_TIMEOUT: "90"
      HTTPX_TIMEOUT: "90"
      HTTPX_THREADS: "250"

      # --- HackerOne ---
      HACKERONE_API_USERNAME: "jackpa1984"
      HACKERONE_API_TOKEN: "${HACKERONE_API_TOKEN:-}"
      H1_API_TOKEN: "${HACKERONE_API_TOKEN:-}"
      H1_PROGRAM_HANDLE: "${H1_PROGRAM_HANDLE:-}"
      H1_AUTO_SUBMIT: "true"
      H1_AUTO_SUBMIT_INTERVAL: "300"
      H1_AUTO_SUBMIT_BATCH: "10"
      H1_AUTO_SUBMIT_DRY_RUN: "${H1_DRY_RUN:-false}"

      # --- Tools ---
      BUG_SCRAPER_PATH: "/opt/Bug_Scraper/bug-scraper.py"
      BUG_SCRAPER_ARGS: "--mode discovery --output json"
      HTTP_PORT_SCANNER_ENABLED: "true"
      HTTP_PORT_SCANNER_PATH: "/opt/HTTP-Port-Scanner-HackerOne-Edition/scanner.py"

      ABUSEIPDB_KEY: ""
      IPINFO_TOKEN: ""

      # --- Tools (fast) ---
      KATANA_TIMEOUT: "60"
      KATANA_DEPTH: "3"
      KATANA_CONCURRENCY: "60"
      GAU_TIMEOUT: "30"

      # --- Intigriti ---
      INTIGRITI_API_TOKEN: "${INTIGRITI_API_TOKEN:-}"

      # --- AI Analyzer ---
      AI_PROVIDER: "${AI_PROVIDER:-anthropic}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-6}"
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-deepseek-r1:7b}"
      AI_MAX_TOKENS: "${AI_MAX_TOKENS:-3000}"
      AI_TEMPERATURE: "${AI_TEMPERATURE:-0.1}"

      # --- Bounty Targets Data ---
      BOUNTY_DATA_ENABLED: "true"
      BOUNTY_DATA_INTERVAL: "1800"
      BOUNTY_DATA_AUTO_IMPORT: "true"
      BOUNTY_DATA_MIN_BOUNTY: "0"
      BOUNTY_DATA_PLATFORMS: "hackerone,intigriti,yeswehack"

      # --- Advanced scanners ---
      PROGRAM_SCORER_ENABLED: "true"
      PROGRAM_SCORER_INTERVAL: "3600"
      H1_MONITOR_INTERVAL: "1800"
      IDOR_SCANNER_ENABLED: "true"
      SSRF_SCANNER_ENABLED: "true"
      GRAPHQL_SCANNER_ENABLED: "true"
      RACE_SCANNER_ENABLED: "true"
      INTERACTSH_ENABLED: "true"
      INTERACTSH_SERVER: "oast.fun"
      CT_MONITOR_ENABLED: "true"
      CT_POLL_INTERVAL: "600"
      CVE_MONITOR_ENABLED: "true"
      CVE_POLL_INTERVAL: "1800"
      ROI_TRACKER_ENABLED: "true"
      CUSTOM_NUCLEI_TEMPLATES: "/app/nuclei-custom-templates"

      # --- Platform Watcher (madmax-hunter scraping) ---
      PLATFORM_WATCHER_ENABLED: "true"
      PLATFORM_WATCHER_INTERVAL: "1800"
      PLATFORM_WATCHER_PLATFORMS: "hackerone,intigriti,yeswehack,bughunt"
      BUGCROWD_API_TOKEN: "${BUGCROWD_API_TOKEN:-}"
      YESWEHACK_TOKEN: "${YESWEHACK_TOKEN:-}"
      BUGHUNT_EMAIL: "${BUGHUNT_EMAIL:-}"
      BUGHUNT_PASSWORD: "${BUGHUNT_PASSWORD:-}"
      CAPSOLVER_API_KEY: "${CAPSOLVER_API_KEY:-}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"

      # --- Telegram ---
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    volumes:
      - ./app:/app/app
      - ./nuclei-custom-templates:/app/nuclei-custom-templates
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host=0.0.0.0
      - --port=5000
      - --loop=uvloop
      - --log-level=info
      - --timeout-keep-alive=120
      - --limit-concurrency=1000
      - --backlog=8192
      - --timeout-graceful-shutdown=10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - scanner_net
    deploy:
      resources:
        limits:
          cpus: "11.0"
          memory: 5g
        reservations:
          cpus: "6.0"
          memory: 2g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    platform: linux/amd64
    container_name: scanner_frontend
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
      API_BACKEND_URL: http://app:5000
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NODE_OPTIONS: "--max-old-space-size=1536"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 512m
    networks:
      - scanner_net

volumes:
  redis_data:
  ollama_data:

networks:
  scanner_net:
    name: scanner-internet_default
