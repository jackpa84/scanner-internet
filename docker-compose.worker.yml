# Workers — configuracao leve com 2 replicas
services:
  worker:
    build: .
    platform: linux/arm64
    cap_add:
      - NET_RAW
      - NET_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ulimits:
      nofile:
        soft: 16384
        hard: 16384
      nproc:
        soft: 4096
        hard: 4096
    env_file:
      - .env
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://user:password@scanner_db:27017/scanner_db?authSource=admin&connectTimeoutMS=30000&serverSelectionTimeoutMS=30000}
      REDIS_URL: "redis://scanner_redis:6379/0"

      AUTH_USERNAME: "admin"
      AUTH_PASSWORD: "scanner2026"
      LOG_LEVEL: "WARNING"
      PYTHONUNBUFFERED: "1"
      PYTHONOPTIMIZE: "2"
      PYTHONDONTWRITEBYTECODE: "1"
      MALLOC_ARENA_MAX: "2"
      UV_THREADPOOL_SIZE: "4"

      NETWORK_SCANNER_ENABLED: "false"
      NUM_WORKERS: "0"
      FEED_ENABLED: "false"

      # Bounty recon
      BOUNTY_MODE: "true"
      BOUNTY_RECON_INTERVAL: "3600"
      BOUNTY_RECON_WORKERS: "2"
      SUBFINDER_TIMEOUT: "300"
      HTTPX_TIMEOUT: "300"
      HTTPX_THREADS: "10"

      # Vuln scanner
      VULN_WORKERS: "2"
      VULN_AUTO_SCAN: "true"
      VULN_AUTO_MIN_SCORE: "30"
      NUCLEI_SEVERITY: "critical,high,medium"
      NUCLEI_TIMEOUT: "120"
      NUCLEI_RATE_LIMIT: "50"
      NUCLEI_BULK_SIZE: "10"
      NUCLEI_CONCURRENCY: "5"
      NMAP_TIMEOUT: "120"

      # Rate limits por replica
      SHODAN_RPS: "2"
      IPAPI_RPS: "0.5"
      IPINFO_RPS: "0.5"
      PRESCAN_TIMEOUT: "0.5"

      MASSCAN_ENABLED: "false"
      ABUSEIPDB_KEY: ""
      IPINFO_TOKEN: ""

      # --- New tools ---
      KATANA_TIMEOUT: "120"
      KATANA_DEPTH: "2"
      GAU_TIMEOUT: "60"

      # --- Advanced scanners ---
      PROGRAM_SCORER_ENABLED: "false"
      IDOR_SCANNER_ENABLED: "true"
      SSRF_SCANNER_ENABLED: "true"
      GRAPHQL_SCANNER_ENABLED: "true"
      RACE_SCANNER_ENABLED: "true"
      INTERACTSH_ENABLED: "true"
      INTERACTSH_SERVER: "oast.fun"
      CT_MONITOR_ENABLED: "false"
      CVE_MONITOR_ENABLED: "false"
      ROI_TRACKER_ENABLED: "false"
      CUSTOM_NUCLEI_TEMPLATES: "/app/nuclei-custom-templates"

      # --- Telegram alerts ---
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"

      # HackerOne
      HACKERONE_API_USERNAME: "${HACKERONE_API_USERNAME:-}"

      # Tools
      BUG_SCRAPER_PATH: "/opt/Bug_Scraper/bug-scraper.py"
      BUG_SCRAPER_ARGS: "--mode discovery --output json --bounty-only"
      HTTP_PORT_SCANNER_ENABLED: "true"
      HTTP_PORT_SCANNER_PATH: "/opt/HTTP-Port-Scanner-HackerOne-Edition/scanner.py"

      # Uvicorn
      WEB_CONCURRENCY: "1"

    networks:
      - scanner_net
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host=0.0.0.0
      - --port=5000
      - --log-level=warning
      - --timeout-keep-alive=30
      - --limit-concurrency=50
      - --backlog=512
      - --no-access-log
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 256m
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

networks:
  scanner_net:
    external: true
    name: scanner-internet_default
